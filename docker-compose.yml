version: "3.9"

# ── Development compose file ───────────────────────────────────────────────────
#
# Default usage (Neo4j only — API runs locally via `make dev`):
#   make neo4j         # starts Neo4j only
#   make dev           # starts Neo4j + API in hot-reload mode
#
# Include the API container:
#   docker compose --profile api up -d
#
# Production:
#   docker compose -f docker-compose.prod.yml up -d
#
# Environment variables are loaded from .env (copy .env.example → .env).

services:
  neo4j:
    image: neo4j:5-community
    container_name: sentinel-neo4j
    ports:
      - "7474:7474"   # Neo4j browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-sentinel_dev}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_pagecache_size: "512M"
      NEO4J_dbms_memory_heap_initial__size: "512M"
      NEO4J_dbms_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: sentinel-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-sentinel_dev}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_REGIONS: ${AWS_REGIONS:-us-east-1}
      AWS_ASSUME_ROLE_ARN: ${AWS_ASSUME_ROLE_ARN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENABLE_RAW_CYPHER: ${ENABLE_RAW_CYPHER:-false}
      SENTINEL_DB_PATH: ${SENTINEL_DB_PATH:-/data/sentinel.db}
    volumes:
      - api_data:/data
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - api

volumes:
  neo4j_data:
  neo4j_logs:
  api_data:
