[tool.uv.workspace]
members = [
    "packages/core",
    "packages/perception",
    "packages/api",
    "packages/agent",
    "packages/remediation",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "moto[ec2,iam,s3,lambda,rds,cloudtrail]>=5.0",
    "boto3>=1.34",
    "ruff>=0.4",
    "mypy>=1.10",
    "httpx>=0.27",           # for FastAPI TestClient async support
    "testcontainers[neo4j]>=4.8",  # E2E tests: real Neo4j in Docker
    "pytest-timeout>=2.3",         # prevent E2E tests hanging indefinitely
    "anthropic>=0.40",             # for mocking in agent tests
    "pytest-benchmark>=4.0",       # performance benchmark suite
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
]
markers = [
    "e2e: marks tests as end-to-end (requires Docker, run with: pytest -m e2e)",
    "slow: marks tests that take more than 5 seconds",
    "benchmark: marks performance benchmark tests (requires Docker, run with: make bench)",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
