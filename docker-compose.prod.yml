version: "3.9"

# ── Production compose file ────────────────────────────────────────────────────
#
# Starts a full SENTINEL stack:
#   Neo4j   — graph database
#   API     — FastAPI backend
#   Frontend — Next.js UI
#   Nginx   — reverse proxy (port 80)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
#
# Required environment variables (set in .env or export before running):
#   NEO4J_PASSWORD   — strong password for the Neo4j database
#   ANTHROPIC_API_KEY — for the LLM agent (Phase 2)
#   AWS_REGIONS      — comma-separated list of AWS regions to scan
#
# Optional:
#   AWS_ASSUME_ROLE_ARN  — for cross-account scanning
#   SENTINEL_DB_PATH     — defaults to /data/sentinel.db (inside api container)
#   REGISTRY             — Docker image registry (default: local build)

services:

  # ── Neo4j ──────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: sentinel-neo4j
    # In production, Neo4j ports are NOT exposed to the host.
    # All access goes through the API (Bolt) or Nginx (no direct browser access).
    expose:
      - "7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_pagecache_size: "1G"
      NEO4J_dbms_memory_heap_initial__size: "512M"
      NEO4J_dbms_memory_heap_max__size: "2G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 512M

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: runtime
    image: ${REGISTRY:-sentinel}/sentinel-api:${IMAGE_TAG:-latest}
    container_name: sentinel-api
    expose:
      - "8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_REGIONS: ${AWS_REGIONS:-us-east-1}
      AWS_ASSUME_ROLE_ARN: ${AWS_ASSUME_ROLE_ARN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENABLE_RAW_CYPHER: "false"
      SENTINEL_DB_PATH: /data/sentinel.db
      RATE_LIMIT_ENABLED: "true"
      API_KEY: ${API_KEY:-}
    volumes:
      - api_data:/data
    depends_on:
      neo4j:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        # Empty: Nginx handles /api/* routing so no API URL needed at build time.
        NEXT_PUBLIC_API_URL: ""
    image: ${REGISTRY:-sentinel}/sentinel-frontend:${IMAGE_TAG:-latest}
    container_name: sentinel-frontend
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1-alpine
    container_name: sentinel-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/sentinel.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  neo4j_data:
  neo4j_logs:
  api_data:
