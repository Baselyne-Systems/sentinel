# SENTINEL — Nginx reverse proxy
#
# Routes:
#   /api/*    → sentinel-api:8000  (FastAPI)
#   /health   → sentinel-api:8000  (health check passthrough)
#   /docs     → sentinel-api:8000  (FastAPI OpenAPI docs)
#   /openapi* → sentinel-api:8000  (OpenAPI schema)
#   /*        → sentinel-frontend:3000 (Next.js)
#
# SSE (Server-Sent Events) note: proxy_buffering is disabled for /api/ so
# that streaming responses (agent analysis) are delivered immediately.

upstream sentinel_api {
    server sentinel-api:8000;
    keepalive 32;
}

upstream sentinel_frontend {
    server sentinel-frontend:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Increase timeouts for long-running scans and SSE streams.
    proxy_read_timeout  180s;
    proxy_send_timeout  180s;
    proxy_connect_timeout 10s;

    # ── API routes ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://sentinel_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Disable buffering for SSE (agent streaming) endpoints.
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── Health check (used by load balancers) ──────────────────────────────────
    location = /health {
        proxy_pass         http://sentinel_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── FastAPI docs ───────────────────────────────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass         http://sentinel_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Frontend (Next.js) ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://sentinel_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (Next.js HMR in dev, if needed).
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
