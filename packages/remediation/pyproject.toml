[project]
name = "sentinel-remediation"
version = "0.1.0"
description = "SENTINEL Remediation: autonomous safe remediation with human approval gates"
requires-python = ">=3.12"
dependencies = [
    "sentinel-core",
    "boto3>=1.34",
    "pydantic>=2.7",
]

[tool.uv.sources]
sentinel-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sentinel_remediation"]
