[project]
name = "sentinel-agent"
version = "0.1.0"
description = "SENTINEL Agent: LLM reasoning layer with tool-use and streaming analysis"
requires-python = ">=3.12"
dependencies = [
    "sentinel-core",
    "anthropic>=0.40",
    "openai>=1.0",
    "pydantic>=2.7",
]

[tool.uv.sources]
sentinel-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sentinel_agent"]
