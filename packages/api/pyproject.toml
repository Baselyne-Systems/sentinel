[project]
name = "sentinel-api"
version = "0.1.0"
description = "SENTINEL API: FastAPI REST layer"
requires-python = ">=3.12"
dependencies = [
    "sentinel-core",
    "sentinel-perception",
    "sentinel-agent",
    "sentinel-remediation",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "python-multipart>=0.0.9",
    "aiosqlite>=0.20",
    "slowapi>=0.1.9",
]

[tool.uv.sources]
sentinel-core = { workspace = true }
sentinel-perception = { workspace = true }
sentinel-agent = { workspace = true }
sentinel-remediation = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sentinel_api"]
